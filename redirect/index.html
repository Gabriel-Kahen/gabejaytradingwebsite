<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting to gabetrading.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://gabetrading.com/" />
    <link rel="canonical" href="https://gabetrading.com/" />
    <script>
      const target = `https://gabetrading.com${window.location.pathname}${window.location.search}${window.location.hash}`;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="https://gabetrading.com/">gabetrading.com</a>...</p>
  </body>
</html>
